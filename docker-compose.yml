services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload_password
      POSTGRES_DB: payload_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: